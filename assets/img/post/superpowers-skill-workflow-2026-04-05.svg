<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Superpowers skills workflow</title>
  <desc id="desc">A flowchart showing Superpowers skill flow from session start to brainstorming, worktree setup, writing plans, execution, auxiliary skills, and branch completion.</desc>
  <defs>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
      .section { font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #374151; }
      .note { font: 400 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #6b7280; }
      .arrow { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
      .box { stroke-width: 1.5; rx: 16; ry: 16; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="#f8fafc"/>
  <text x="60" y="60" class="title">Superpowers 的 skill 调用路径</text>
  <text x="60" y="90" class="subtitle">主路径来自 hook 注入和各个 skill 提示词里的“下一步”约束，不是程序里硬编码的固定状态机。</text>

  <rect x="50" y="130" width="1300" height="800" rx="24" fill="#ffffff" stroke="#e5e7eb"/>

  <text x="88" y="168" class="section">入口 / 准备阶段</text>
  <text x="430" y="168" class="section">执行方式</text>
  <text x="735" y="168" class="section">执行阶段的辅助 skill</text>
  <text x="1100" y="168" class="section">完成阶段</text>
  <text x="1110" y="760" class="section">元 skill</text>

  <!-- Left Column: Setup (x=80) -->
  <rect class="box" x="80" y="200" width="220" height="74" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="190" y="228" text-anchor="middle" class="label">using-superpowers</text>
  <text x="190" y="248" text-anchor="middle" class="small">会话起点，先判断该用哪个 skill</text>

  <rect class="box" x="80" y="330" width="220" height="78" fill="#dbeafe" stroke="#2563eb"/>
  <text x="190" y="358" text-anchor="middle" class="label">brainstorming</text>
  <text x="190" y="378" text-anchor="middle" class="small">先澄清需求、出设计、写 spec</text>

  <rect class="box" x="80" y="468" width="220" height="78" fill="#dcfce7" stroke="#16a34a"/>
  <text x="190" y="496" text-anchor="middle" class="label">using-git-worktrees</text>
  <text x="190" y="516" text-anchor="middle" class="small">切到隔离工作目录和分支</text>

  <rect class="box" x="80" y="606" width="220" height="82" fill="#fef3c7" stroke="#d97706"/>
  <text x="190" y="634" text-anchor="middle" class="label">writing-plans</text>
  <text x="190" y="654" text-anchor="middle" class="small">把 spec 写成可执行 plan</text>

  <!-- Execution Column (x=380) -->
  <rect class="box" x="380" y="606" width="250" height="82" fill="#fee2e2" stroke="#dc2626"/>
  <text x="505" y="634" text-anchor="middle" class="label">subagent-driven-development</text>
  <text x="505" y="654" text-anchor="middle" class="small">推荐路径：每个 task 派新 subagent</text>

  <rect class="box" x="380" y="728" width="250" height="82" fill="#fce7f3" stroke="#db2777"/>
  <text x="505" y="756" text-anchor="middle" class="label">executing-plans</text>
  <text x="505" y="776" text-anchor="middle" class="small">备选路径：当前会话内按 plan 执行</text>

  <!-- Auxiliary Skills Box (Dashed Box in the middle, x=680) -->
  <rect class="box dash" x="680" y="180" width="350" height="632" fill="none" stroke="#6b7280" stroke-width="1"/>

  <rect class="box" x="735" y="220" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="248" text-anchor="middle" class="label">test-driven-development</text>
  <text x="855" y="268" text-anchor="middle" class="small">实现任何功能或修 bug 前先写失败测试</text>

  <rect class="box" x="735" y="320" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="348" text-anchor="middle" class="label">systematic-debugging</text>
  <text x="855" y="368" text-anchor="middle" class="small">遇到异常先找 root cause，再谈修复</text>

  <rect class="box" x="735" y="420" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="448" text-anchor="middle" class="label">requesting-code-review</text>
  <text x="855" y="468" text-anchor="middle" class="small">大步骤完成后派 code-reviewer review</text>

  <rect class="box" x="735" y="520" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="548" text-anchor="middle" class="label">receiving-code-review</text>
  <text x="855" y="568" text-anchor="middle" class="small">收到 review 后先验证，再决定采纳与否</text>

  <rect class="box" x="735" y="620" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="648" text-anchor="middle" class="label">verification-before-completion</text>
  <text x="855" y="668" text-anchor="middle" class="small">宣称完成前必须重新跑验证命令</text>

  <rect class="box" x="735" y="720" width="240" height="72" fill="#fff7ed" stroke="#ea580c"/>
  <text x="855" y="748" text-anchor="middle" class="label">dispatching-parallel-agents</text>
  <text x="855" y="768" text-anchor="middle" class="small">多个独立问题时并行派代理</text>

  <!-- Final Column (x=1080) -->
  <rect class="box" x="1080" y="606" width="250" height="82" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="1205" y="634" text-anchor="middle" class="label">finishing-a-development-branch</text>
  <text x="1205" y="654" text-anchor="middle" class="small">测试通过后决定 merge / PR / 保留 / 丢弃</text>

  <!-- Meta Skill -->
  <rect class="box" x="1080" y="792" width="250" height="72" fill="#ecfccb" stroke="#65a30d"/>
  <text x="1205" y="820" text-anchor="middle" class="label">writing-skills</text>
  <text x="1205" y="840" text-anchor="middle" class="small">给维护者写/改 skill 用，不在日常开发主路径里</text>

  <!-- Main Arrows -->
  <path class="arrow dash" d="M190 274 L190 330"/>
  <path class="arrow dash" d="M190 408 L190 468"/>
  <path class="arrow dash" d="M190 546 L190 606"/>

  <path class="arrow dash" d="M300 647 L380 647"/>
  <path class="arrow dash" d="M300 662 C340 662, 340 769, 380 769"/>

  <!-- From Execution to Auxiliary Box -->
  <path class="arrow dash" d="M630 647 L680 647"/>
  <path class="arrow dash" d="M630 769 C655 769, 655 647, 680 647"/>

  <!-- From Auxiliary Box to Finishing -->
  <path class="arrow dash" d="M1030 647 L1080 647"/>

  <!-- Entry note -->
  <rect x="345" y="205" width="300" height="64" rx="14" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="495" y="230" text-anchor="middle" class="label">SessionStart hook</text>
  <text x="495" y="250" text-anchor="middle" class="small">把 using-superpowers 注入当前会话上下文</text>
  <path class="arrow" d="M345 237 L300 237"/>

  <!-- legend -->
  <rect x="70" y="866" width="1260" height="52" rx="10" fill="#f8fafc" stroke="#e5e7eb"/>
  <line x1="98" y1="886" x2="144" y2="886" class="arrow"/>
  <text x="154" y="891" class="note">实线：SessionStart hook 把 using-superpowers 注入会话</text>
  <line x1="98" y1="904" x2="144" y2="904" class="arrow dash"/>
  <text x="154" y="909" class="note">虚线：skill 与 skill 之间按提示词和场景切换，不是硬编码调用</text>
  <text x="760" y="891" class="note">方框颜色只是为了把主路径、执行辅助、元 skill 视觉上分层，不是严格图例。</text>
  <text x="760" y="909" class="note">辅助技能区（虚框）在执行过程中按需调用，完成后统一进入收尾环节。</text>
</svg>
